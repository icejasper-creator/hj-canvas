<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HJ Canvas Board</title>
<style>
  :root{
    --blue:#0f4c81;
    --bg:#e7eef7;
    --panel:#ffffff;
    --line:#d0d7e2;
    --text:#111827;
    --muted:#6b7280;
    --warn:#f59e0b;
    --danger:#dc2626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
  body{position:fixed;inset:0}
  #app{height:100dvh;display:grid;grid-template-rows:auto 1fr}
  #top{
    display:flex;align-items:center;gap:7px;
    background:var(--blue);color:#fff;padding:8px;
    overflow-x:auto;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.18);
    -webkit-overflow-scrolling:touch
  }
  #brand{font-weight:800;margin-right:6px}
  button,select{
    appearance:none;border:1px solid #cbd5e1;background:#fff;color:#111827;
    border-radius:9px;padding:8px 10px;font:14px Arial;min-height:38px;
  }
  button.active{background:#fde68a;border-color:var(--warn);font-weight:800}
  button.danger{color:var(--danger);font-weight:700}
  #main{position:relative;padding:12px;height:100%;min-height:0}
  #frame{
    position:absolute;inset:12px;background:#fff;border:3px solid var(--blue);
    border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.22)
  }
  canvas{display:block;width:100%;height:100%;touch-action:none;background:#fff}
  #status{
    position:absolute;left:24px;bottom:22px;background:rgba(15,23,42,.86);
    color:#fff;font-size:12px;padding:7px 9px;border-radius:8px;pointer-events:none;max-width:calc(100% - 48px)
  }
  #bom{
    position:absolute;right:24px;bottom:22px;background:rgba(255,255,255,.96);
    font-size:12px;line-height:1.45;padding:9px 11px;border-radius:10px;border:1px solid var(--line);
    box-shadow:0 4px 14px rgba(0,0,0,.14);min-width:135px;pointer-events:none
  }
  @media(max-width:760px){
    #top{font-size:13px;padding:7px}
    button,select{font-size:13px;padding:7px 8px}
    #bom{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <div id="brand">HJ Canvas v0.6</div>
    <button data-tool="pen" class="active">✏️ 画笔</button>
    <button data-tool="magic">🪄 魔术笔</button>
    <button data-tool="line">〰️ 路径</button>
    <button data-tool="rect">⬜ 房间</button>
    <button data-tool="text">T 文本</button>
    <button data-tool="camera">📷 监控</button>
    <button data-tool="select">🖱️ 选择</button>
    <button id="deleteBtn" class="danger">🗑️ 删除</button>
    <button id="rotL">⟲</button>
    <button id="rotR">⟳</button>
    <select id="angle">
      <option value="60">60°</option>
      <option value="90" selected>90°</option>
      <option value="120">120°</option>
      <option value="180">180°</option>
      <option value="360">360°</option>
    </select>
    <button id="undo">Undo</button>
    <button id="save">Save</button>
    <button id="load">Load</button>
    <button id="png">PNG</button>
    <button id="clear" class="danger">清空</button>
  </div>

  <div id="main">
    <div id="frame"><canvas id="canvas"></canvas></div>
    <div id="status">工具：画笔。白色区域可直接画。</div>
    <div id="bom"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const status = document.getElementById("status");
  const bom = document.getElementById("bom");
  const frame = document.getElementById("frame");

  let tool = "pen";
  let objects = [];
  let selected = null;
  let drawing = false;
  let temp = null;
  let last = null;
  let history = [];
  let nextId = 1;

  const toolName = {
    pen:"画笔", magic:"魔术笔 90°", line:"路径", rect:"房间",
    text:"文本", camera:"监控", select:"选择"
  };

  function id(){ return "o" + (nextId++); }
  function cloneState(){ return JSON.stringify({objects, nextId}); }
  function pushHistory(){ history.push(cloneState()); if(history.length>80) history.shift(); }
  function restoreState(json){ const s=JSON.parse(json); objects=s.objects||[]; nextId=s.nextId||1; selected=null; temp=null; drawing=false; render(); }

  function point(ev){
    const r = canvas.getBoundingClientRect();
    const e = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
    return {x:e.clientX-r.left, y:e.clientY-r.top};
  }

  function resize(){
    const r = frame.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.max(1, Math.floor(r.width*dpr));
    canvas.height = Math.max(1, Math.floor(r.height*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    render();
  }
  window.addEventListener("resize", resize);
  if(window.ResizeObserver) new ResizeObserver(resize).observe(frame);

  function setTool(t){
    tool = t;
    temp = null;
    drawing = false;
    selected = null;
    document.querySelectorAll("[data-tool]").forEach(b => b.classList.toggle("active", b.dataset.tool === t));
    status.textContent = "工具：" + toolName[t] + "。";
    render();
  }

  document.querySelectorAll("[data-tool]").forEach(b => b.addEventListener("click", () => setTool(b.dataset.tool)));

  function drawGrid(w,h){
    ctx.strokeStyle = "rgba(15,76,129,.09)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let x=0; x<w; x+=20){ ctx.moveTo(x,0); ctx.lineTo(x,h); }
    for(let y=0; y<h; y+=20){ ctx.moveTo(0,y); ctx.lineTo(w,y); }
    ctx.stroke();
    ctx.fillStyle = "rgba(15,76,129,.08)";
    ctx.font = "bold 32px Arial";
    ctx.fillText("HJ SECURITY CANVAS BOARD", 26, 48);
  }

  function render(){
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,w,h);
    drawGrid(w,h);
    objects.forEach(o => drawObj(o,false));
    if(temp) drawObj(temp,true);
    drawSelection();
    updateBom();
  }

  function drawObj(o, ghost){
    ctx.save();
    ctx.globalAlpha = ghost ? .65 : 1;
    if(o.type==="pen") drawPath(o.points, "#111827", o.width||3, false);
    if(o.type==="magic") drawPath(o.points, "#334155", o.width||4, false);
    if(o.type==="line") drawPath(o.points, "#0f4c81", o.width||3, true);
    if(o.type==="rect") drawRect(o);
    if(o.type==="text") drawText(o);
    if(o.type==="camera") drawCamera(o);
    ctx.restore();
  }

  function drawPath(pts, color, width, dash){
    if(!pts || pts.length<2) return;
    ctx.save();
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = "round"; ctx.lineJoin = "round";
    if(dash) ctx.setLineDash([10,6]);
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    r = Math.max(0, Math.min(r, Math.abs(w)/2, Math.abs(h)/2));
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawRect(o){
    const x=Math.min(o.x1,o.x2), y=Math.min(o.y1,o.y2), w=Math.abs(o.x2-o.x1), h=Math.abs(o.y2-o.y1);
    ctx.fillStyle="rgba(148,163,184,.08)";
    ctx.strokeStyle="#334155"; ctx.lineWidth=2;
    roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#111827"; ctx.font="bold 14px Arial"; ctx.fillText(o.label||"Room / Zone", x+10, y+22);
  }

  function drawText(o){
    ctx.fillStyle="#111827"; ctx.font="bold 18px Arial"; ctx.fillText(o.text||"Text", o.x, o.y);
  }

  function drawCamera(o){
    ctx.save();
    ctx.translate(o.x,o.y);
    ctx.rotate((o.rotation||0)*Math.PI/180);
    const angle = o.angle || 90, radius = o.distance || 135;

    if(angle>=360){
      const g=ctx.createRadialGradient(0,0,8,0,0,radius);
      g.addColorStop(0,"rgba(37,99,235,.30)");
      g.addColorStop(1,"rgba(37,99,235,.02)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="rgba(37,99,235,.35)"; ctx.stroke();
    }else{
      const a1=-angle/2*Math.PI/180, a2=angle/2*Math.PI/180;
      const g=ctx.createRadialGradient(0,0,8,0,0,radius);
      g.addColorStop(0,"rgba(37,99,235,.34)");
      g.addColorStop(1,"rgba(37,99,235,.02)");
      ctx.fillStyle=g; ctx.strokeStyle="rgba(37,99,235,.45)"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,radius,a1,a2); ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    ctx.shadowColor="rgba(0,0,0,.22)"; ctx.shadowBlur=9; ctx.shadowOffsetX=2; ctx.shadowOffsetY=3;
    ctx.fillStyle="#fff"; ctx.strokeStyle="#0f4c81"; ctx.lineWidth=2;
    roundRect(-28,-18,42,36,9); ctx.fill(); ctx.stroke();
    ctx.shadowColor="transparent";
    ctx.fillStyle="#dbeafe"; roundRect(9,-10,25,20,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#0f4c81"; ctx.beginPath(); ctx.arc(23,0,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#111827"; ctx.font="bold 12px Arial"; ctx.fillText(o.name||"CCTV", -24, 34);
    ctx.restore();
  }

  function bounds(o){
    if(o.type==="rect"){
      const x=Math.min(o.x1,o.x2), y=Math.min(o.y1,o.y2);
      return {x,y,w:Math.abs(o.x2-o.x1),h:Math.abs(o.y2-o.y1)};
    }
    if(o.type==="camera") return {x:o.x-34,y:o.y-28,w:68,h:58};
    if(o.type==="text") return {x:o.x,y:o.y-22,w:Math.max(80,(o.text||"").length*11),h:30};
    if(o.points && o.points.length){
      const xs=o.points.map(p=>p.x), ys=o.points.map(p=>p.y);
      const minX=Math.min(...xs), minY=Math.min(...ys), maxX=Math.max(...xs), maxY=Math.max(...ys);
      return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
    }
    return null;
  }

  function drawSelection(){
    const o = objects.find(x=>x.id===selected);
    const b = o && bounds(o);
    if(!b) return;
    ctx.save();
    ctx.strokeStyle="#f59e0b"; ctx.lineWidth=3; ctx.setLineDash([7,5]);
    ctx.strokeRect(b.x-8,b.y-8,b.w+16,b.h+16);
    ctx.setLineDash([]); ctx.restore();
  }

  function distLine(p,a,b){
    const A=p.x-a.x, B=p.y-a.y, C=b.x-a.x, D=b.y-a.y;
    const len=C*C+D*D; let t=len ? (A*C+B*D)/len : 0;
    t=Math.max(0,Math.min(1,t));
    return Math.hypot(p.x-(a.x+t*C), p.y-(a.y+t*D));
  }

  function hit(p){
    for(let i=objects.length-1;i>=0;i--){
      const o=objects[i];
      if(o.points && o.points.length>1){
        for(let j=0;j<o.points.length-1;j++) if(distLine(p,o.points[j],o.points[j+1])<12) return o;
      }else{
        const b=bounds(o);
        if(b && p.x>=b.x-12 && p.x<=b.x+b.w+12 && p.y>=b.y-12 && p.y<=b.y+b.h+12) return o;
      }
    }
    return null;
  }

  function move(o,dx,dy){
    if(o.type==="rect"){ o.x1+=dx; o.x2+=dx; o.y1+=dy; o.y2+=dy; }
    else if(o.points){ o.points=o.points.map(p=>({x:p.x+dx,y:p.y+dy})); }
    else { o.x+=dx; o.y+=dy; }
  }

  function simplify(pts){
    const out=[];
    for(const p of pts){
      if(!out.length || Math.hypot(p.x-out[out.length-1].x,p.y-out[out.length-1].y)>2) out.push(p);
    }
    return out;
  }

  function magicPoint(start, p){
    const dx = p.x-start.x, dy = p.y-start.y;
    if(Math.abs(dx) >= Math.abs(dy)) return {x:p.x, y:start.y};
    return {x:start.x, y:p.y};
  }

  function down(ev){
    ev.preventDefault();
    const p=point(ev);

    if(tool==="text"){
      const text = prompt("输入文字：","CCTV-GF-01");
      if(text!==null){ pushHistory(); const o={id:id(),type:"text",x:p.x,y:p.y,text:text||"Text"}; objects.push(o); selected=o.id; render(); }
      return;
    }

    if(tool==="camera"){
      pushHistory();
      const o={id:id(),type:"camera",x:p.x,y:p.y,rotation:0,angle:parseInt(document.getElementById("angle").value,10),distance:135,name:"CCTV"};
      objects.push(o); selected=o.id; render(); return;
    }

    if(tool==="select"){
      const o=hit(p); selected=o ? o.id : null; drawing=!!o; last=p; render(); return;
    }

    pushHistory();
    drawing=true; selected=null; last=p;
    if(tool==="pen") temp={id:"temp",type:"pen",points:[p],width:3};
    if(tool==="line") temp={id:"temp",type:"line",points:[p],width:3};
    if(tool==="magic") temp={id:"temp",type:"magic",points:[p,p],width:4};
    if(tool==="rect") temp={id:"temp",type:"rect",x1:p.x,y1:p.y,x2:p.x,y2:p.y,label:"Room / Zone"};
  }

  function moveEvt(ev){
    if(!drawing) return;
    ev.preventDefault();
    const p=point(ev);

    if(tool==="select" && selected){
      const o=objects.find(x=>x.id===selected);
      if(o && last){ move(o,p.x-last.x,p.y-last.y); last=p; render(); }
      return;
    }

    if(!temp) return;
    if(temp.type==="pen" || temp.type==="line") temp.points.push(p);
    if(temp.type==="magic") temp.points[1]=magicPoint(temp.points[0],p);
    if(temp.type==="rect"){ temp.x2=p.x; temp.y2=p.y; }
    render();
  }

  function up(ev){
    if(!drawing) return;
    ev.preventDefault();
    if(temp){
      if(temp.points){ temp.points=simplify(temp.points); if(temp.points.length>1){ temp.id=id(); objects.push(temp); selected=temp.id; } }
      else if(temp.type==="rect" && Math.abs(temp.x2-temp.x1)>8 && Math.abs(temp.y2-temp.y1)>8){ temp.id=id(); objects.push(temp); selected=temp.id; }
    }
    temp=null; drawing=false; last=null; render();
  }

  canvas.addEventListener("pointerdown", down);
  canvas.addEventListener("pointermove", moveEvt);
  canvas.addEventListener("pointerup", up);
  canvas.addEventListener("pointercancel", up);

  document.getElementById("deleteBtn").onclick = function(){
    if(selected){ pushHistory(); objects=objects.filter(o=>o.id!==selected); selected=null; render(); }
    else { setTool("select"); status.textContent="先点选择，再点对象，然后删除。"; }
  };
  document.getElementById("rotL").onclick = function(){
    const o=objects.find(x=>x.id===selected);
    if(o && o.type==="camera"){ pushHistory(); o.rotation=(o.rotation-15+360)%360; render(); }
  };
  document.getElementById("rotR").onclick = function(){
    const o=objects.find(x=>x.id===selected);
    if(o && o.type==="camera"){ pushHistory(); o.rotation=(o.rotation+15)%360; render(); }
  };
  document.getElementById("angle").onchange = function(){
    const o=objects.find(x=>x.id===selected);
    if(o && o.type==="camera"){ pushHistory(); o.angle=parseInt(this.value,10); render(); }
  };
  document.getElementById("undo").onclick = function(){
    if(history.length) restoreState(history.pop());
  };
  document.getElementById("save").onclick = function(){
    localStorage.setItem("hj_canvas_v06", JSON.stringify({objects,nextId}));
    alert("Saved");
  };
  document.getElementById("load").onclick = function(){
    const s=localStorage.getItem("hj_canvas_v06");
    if(!s){ alert("No saved drawing"); return; }
    restoreState(s);
  };
  document.getElementById("clear").onclick = function(){
    if(confirm("清空画板？")){ pushHistory(); objects=[]; selected=null; temp=null; render(); }
  };
  document.getElementById("png").onclick = function(){
    const a=document.createElement("a");
    a.download="HJ_Canvas_Board.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  };

  window.addEventListener("keydown", function(e){
    if((e.key==="Delete" || e.key==="Backspace") && selected){
      pushHistory(); objects=objects.filter(o=>o.id!==selected); selected=null; render();
    }
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z"){
      e.preventDefault(); document.getElementById("undo").click();
    }
  });

  function updateBom(){
    const count = t => objects.filter(o=>o.type===t).length;
    bom.innerHTML =
      "Camera: <b>"+count("camera")+"</b><br>"+
      "Pen: <b>"+count("pen")+"</b><br>"+
      "Magic: <b>"+count("magic")+"</b><br>"+
      "Cable: <b>"+count("line")+"</b><br>"+
      "Room: <b>"+count("rect")+"</b><br>"+
      "Text: <b>"+count("text")+"</b><br>"+
      "Total: <b>"+objects.length+"</b>";
  }

  setTimeout(resize,50);
  setTimeout(resize,300);
  setTool("pen");
})();
</script>
</body>
</html>
