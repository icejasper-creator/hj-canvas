<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>HJ Canvas Board</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;background:#dfe7f1;color:#111827;
  }
  #app{width:100vw;height:100vh;display:grid;grid-template-rows:auto 1fr}
  #toolbar{
    background:#0f4c81;color:white;display:flex;align-items:center;gap:7px;
    padding:8px;overflow-x:auto;white-space:nowrap;
    border-bottom:1px solid rgba(255,255,255,.15)
  }
  #toolbar .brand{font-weight:700;margin-right:8px;min-width:max-content}
  button,select{font:inherit}
  button,select{
    border:1px solid #cbd5e1;background:white;color:#111827;
    border-radius:8px;padding:8px 10px;cursor:pointer;min-height:38px
  }
  button.active{background:#fde68a;border-color:#f59e0b;font-weight:700}
  button.danger{color:#dc2626}
  #boardArea{position:relative;width:100%;height:100%;padding:14px}
  #boardFrame{
    position:absolute;left:14px;right:14px;top:14px;bottom:14px;
    background:white;border:3px solid #0f4c81;border-radius:12px;
    box-shadow:0 8px 22px rgba(0,0,0,.18);overflow:hidden
  }
  #canvas{width:100%;height:100%;display:block;background:white;cursor:crosshair;touch-action:none}
  #status{
    position:absolute;left:28px;bottom:26px;background:rgba(15,23,42,.88);
    color:white;font-size:13px;padding:8px 10px;border-radius:8px;pointer-events:none
  }
  #bom{
    position:absolute;right:28px;bottom:26px;background:rgba(255,255,255,.96);
    color:#111827;font-size:13px;padding:10px 12px;border-radius:10px;
    border:1px solid #cbd5e1;min-width:160px;box-shadow:0 4px 14px rgba(0,0,0,.12);
    pointer-events:none;line-height:1.45
  }
  @media(max-width:760px){
    #toolbar{font-size:13px}
    button,select{padding:7px 8px}
    #bom{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="brand">HJ Canvas Board v0.5</div>
    <button id="penBtn" class="active">✏️ 画笔</button>
    <button id="lineBtn">〰️ 路径</button>
    <button id="rectBtn">⬜ 矩形</button>
    <button id="textBtn">T 文本</button>
    <button id="cameraBtn">📷 监控</button>
    <button id="selectBtn">🖱️ 选择</button>
    <button id="deleteBtn" class="danger">🗑️ 删除</button>
    <button id="rotLBtn">⟲</button>
    <button id="rotRBtn">⟳</button>
    <select id="angleSel" title="Camera viewing angle">
      <option value="60">60°</option>
      <option value="90" selected>90°</option>
      <option value="120">120°</option>
      <option value="180">180°</option>
      <option value="360">360°</option>
    </select>
    <button id="undoBtn">Undo</button>
    <button id="clearBtn" class="danger">清空</button>
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load</button>
    <button id="pngBtn">PNG</button>
  </div>

  <div id="boardArea">
    <div id="boardFrame"><canvas id="canvas"></canvas></div>
    <div id="status">工具：画笔。直接在白色画板拖动就能画。</div>
    <div id="bom">Camera: 0<br>Line: 0<br>Rect: 0<br>Text: 0</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let tool = 'pen';
  let objects = [];
  let selectedId = null;
  let drawing = false;
  let temp = null;
  let history = [];
  let idCounter = 1;
  let lastPoint = null;

  function uid(){ return 'obj_' + (idCounter++); }

  function boardPoint(e){
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches && e.touches[0] ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    render();
  }

  if(window.ResizeObserver){
    new ResizeObserver(resize).observe(document.getElementById('boardFrame'));
  }
  window.addEventListener('resize', resize);

  function saveHistory(){
    history.push(JSON.stringify({objects, idCounter}));
    if(history.length > 80) history.shift();
  }

  function setTool(t){
    tool = t;
    selectedId = null;
    temp = null;
    drawing = false;
    document.querySelectorAll('#toolbar button').forEach(b=>b.classList.remove('active'));
    const map = {pen:'penBtn',line:'lineBtn',rect:'rectBtn',text:'textBtn',camera:'cameraBtn',select:'selectBtn',delete:'deleteBtn'};
    if(map[t]) document.getElementById(map[t]).classList.add('active');
    updateStatus();
    render();
  }

  function updateStatus(){
    const name = {pen:'画笔',line:'路径',rect:'矩形',text:'文本',camera:'监控',select:'选择',delete:'删除'}[tool];
    document.getElementById('status').textContent = '工具：' + name + '。白色区域就是画板。';
  }

  function render(){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;

    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = 'rgba(15,76,129,0.10)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let x=0;x<w;x+=20){ctx.moveTo(x,0);ctx.lineTo(x,h);}
    for(let y=0;y<h;y+=20){ctx.moveTo(0,y);ctx.lineTo(w,y);}
    ctx.stroke();

    ctx.fillStyle = 'rgba(15,76,129,0.08)';
    ctx.font = 'bold 34px Arial';
    ctx.fillText('HJ SECURITY CANVAS BOARD', 30, 55);

    for(const o of objects) drawObject(o);
    if(temp) drawObject(temp, true);
    drawSelection();
    updateBom();
  }

  function drawObject(o, isTemp){
    ctx.save();
    ctx.globalAlpha = isTemp ? 0.75 : 1;

    if(o.type === 'pen') drawPath(o.points, '#111827', o.width || 3, false);

    if(o.type === 'line'){
      drawPath(o.points, '#0f4c81', o.width || 3, true);
      if(o.points.length > 1){
        const mid = o.points[Math.floor(o.points.length/2)];
        ctx.fillStyle = '#0f4c81';
        ctx.font = 'bold 12px Arial';
        ctx.fillText('Cable Route', mid.x + 6, mid.y - 6);
      }
    }

    if(o.type === 'rect'){
      const x = Math.min(o.x1,o.x2), y = Math.min(o.y1,o.y2);
      const w = Math.abs(o.x2-o.x1), h = Math.abs(o.y2-o.y1);
      ctx.fillStyle = 'rgba(148,163,184,0.08)';
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      roundRect(x,y,w,h,8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#111827';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('Room / Zone', x+10, y+22);
    }

    if(o.type === 'text'){
      ctx.fillStyle = '#111827';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(o.text, o.x, o.y);
    }

    if(o.type === 'camera') drawCamera(o);
    ctx.restore();
  }

  function drawPath(points, color, width, dashed){
    if(!points || points.length < 2) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if(dashed) ctx.setLineDash([10,6]);
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
    ctx.restore();
  }

  function drawCamera(o){
    ctx.save();
    ctx.translate(o.x,o.y);
    ctx.rotate((o.rotation || 0) * Math.PI / 180);

    const angle = o.angle || 90;
    const radius = o.distance || 135;
    if(angle >= 360){
      const g = ctx.createRadialGradient(0,0,10,0,0,radius);
      g.addColorStop(0,'rgba(37,99,235,0.28)');
      g.addColorStop(1,'rgba(37,99,235,0.02)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0,0,radius,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(37,99,235,.35)';
      ctx.stroke();
    }else{
      const a1 = -angle/2 * Math.PI/180;
      const a2 = angle/2 * Math.PI/180;
      const g = ctx.createRadialGradient(0,0,10,0,0,radius);
      g.addColorStop(0,'rgba(37,99,235,0.32)');
      g.addColorStop(1,'rgba(37,99,235,0.03)');
      ctx.fillStyle = g;
      ctx.strokeStyle = 'rgba(37,99,235,.45)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,radius,a1,a2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.shadowColor = 'rgba(0,0,0,.22)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;

    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#0f4c81';
    ctx.lineWidth = 2;
    roundRect(-28,-18,42,36,9);
    ctx.fill(); ctx.stroke();

    ctx.shadowColor = 'transparent';

    ctx.fillStyle = '#dbeafe';
    ctx.strokeStyle = '#0f4c81';
    roundRect(10,-10,24,20,8);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#0f4c81';
    ctx.beginPath();
    ctx.arc(23,0,5,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#111827';
    ctx.font = 'bold 12px Arial';
    ctx.fillText('CCTV', -24, 34);
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawSelection(){
    const o = objects.find(x=>x.id===selectedId);
    if(!o) return;
    const b = bounds(o);
    if(!b) return;

    ctx.save();
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 3;
    ctx.setLineDash([8,5]);
    ctx.strokeRect(b.x-8,b.y-8,b.w+16,b.h+16);
    ctx.setLineDash([]);
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(b.x+b.w+12,b.y-12,6,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function bounds(o){
    if(o.type === 'rect'){
      const x = Math.min(o.x1,o.x2), y = Math.min(o.y1,o.y2);
      const w = Math.abs(o.x2-o.x1), h = Math.abs(o.y2-o.y1);
      return {x,y,w,h};
    }
    if(o.type === 'camera') return {x:o.x-35,y:o.y-28,w:70,h:56};
    if(o.type === 'text') return {x:o.x,y:o.y-22,w:Math.max(80,o.text.length*12),h:30};
    if(o.type === 'pen' || o.type === 'line'){
      const xs = o.points.map(p=>p.x), ys = o.points.map(p=>p.y);
      const minX = Math.min(...xs), minY = Math.min(...ys);
      const maxX = Math.max(...xs), maxY = Math.max(...ys);
      return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
    }
    return null;
  }

  function hitTest(p){
    for(let i=objects.length-1;i>=0;i--){
      const o = objects[i];
      if(o.type === 'pen' || o.type === 'line'){
        for(let j=0;j<o.points.length-1;j++){
          if(pointLineDistance(p,o.points[j],o.points[j+1]) < 10) return o;
        }
      }else{
        const b = bounds(o);
        if(b && p.x>=b.x-10 && p.x<=b.x+b.w+10 && p.y>=b.y-10 && p.y<=b.y+b.h+10) return o;
      }
    }
    return null;
  }

  function pointLineDistance(p,a,b){
    const A=p.x-a.x, B=p.y-a.y, C=b.x-a.x, D=b.y-a.y;
    const dot=A*C+B*D;
    const len=C*C+D*D;
    let t = len ? dot/len : 0;
    t = Math.max(0, Math.min(1,t));
    const x=a.x+t*C, y=a.y+t*D;
    return Math.hypot(p.x-x,p.y-y);
  }

  function updateBom(){
    const cam = objects.filter(o=>o.type==='camera').length;
    const line = objects.filter(o=>o.type==='line').length;
    const rect = objects.filter(o=>o.type==='rect').length;
    const text = objects.filter(o=>o.type==='text').length;
    document.getElementById('bom').innerHTML =
      'Camera: <b>'+cam+'</b><br>' +
      'Line: <b>'+line+'</b><br>' +
      'Rect: <b>'+rect+'</b><br>' +
      'Text: <b>'+text+'</b><br>' +
      'Total: <b>'+objects.length+'</b>';
  }

  function moveObject(o, dx, dy){
    if(o.type === 'rect'){ o.x1 += dx; o.x2 += dx; o.y1 += dy; o.y2 += dy; }
    if(o.type === 'camera' || o.type === 'text'){ o.x += dx; o.y += dy; }
    if(o.type === 'pen' || o.type === 'line') o.points = o.points.map(p=>({x:p.x+dx,y:p.y+dy}));
  }

  function simplify(points){
    const out = [];
    for(const p of points){
      if(out.length === 0 || Math.hypot(p.x-out[out.length-1].x,p.y-out[out.length-1].y) > 2) out.push(p);
    }
    return out;
  }

  canvas.addEventListener('pointerdown', e=>{
    canvas.setPointerCapture(e.pointerId);
    const p = boardPoint(e);

    if(tool === 'text'){
      const txt = prompt('输入文字：','CCTV-GF-01');
      if(txt !== null){
        saveHistory();
        objects.push({id:uid(), type:'text', x:p.x, y:p.y, text:txt || 'Text'});
        selectedId = objects[objects.length-1].id;
        render();
      }
      return;
    }

    if(tool === 'camera'){
      saveHistory();
      objects.push({id:uid(), type:'camera', x:p.x, y:p.y, rotation:0, angle:parseInt(document.getElementById('angleSel').value,10), distance:135});
      selectedId = objects[objects.length-1].id;
      render();
      return;
    }

    if(tool === 'delete'){
      const hit = hitTest(p);
      if(hit){
        saveHistory();
        objects = objects.filter(o=>o.id!==hit.id);
        selectedId = null;
        render();
      }
      return;
    }

    if(tool === 'select'){
      const hit = hitTest(p);
      if(hit){
        selectedId = hit.id;
        drawing = true;
        lastPoint = p;
      }else{
        selectedId = null;
      }
      render();
      return;
    }

    if(tool === 'pen'){
      saveHistory();
      drawing = true;
      temp = {id:'temp', type:'pen', points:[p], width:3};
      return;
    }

    if(tool === 'line'){
      saveHistory();
      drawing = true;
      temp = {id:'temp', type:'line', points:[p], width:3};
      return;
    }

    if(tool === 'rect'){
      saveHistory();
      drawing = true;
      temp = {id:'temp', type:'rect', x1:p.x, y1:p.y, x2:p.x, y2:p.y};
      return;
    }
  });

  canvas.addEventListener('pointermove', e=>{
    const p = boardPoint(e);

    if(tool === 'select' && drawing && selectedId){
      const o = objects.find(x=>x.id===selectedId);
      if(o && lastPoint){
        const dx = p.x-lastPoint.x, dy = p.y-lastPoint.y;
        moveObject(o, dx, dy);
        lastPoint = p;
        render();
      }
      return;
    }

    if(!drawing || !temp) return;

    if(temp.type === 'pen' || temp.type === 'line') temp.points.push(p);
    if(temp.type === 'rect'){ temp.x2 = p.x; temp.y2 = p.y; }
    render();
  });

  canvas.addEventListener('pointerup', ()=>{
    if(temp){
      if(temp.type === 'pen' || temp.type === 'line'){
        temp.points = simplify(temp.points);
        if(temp.points.length > 1){ temp.id = uid(); objects.push(temp); selectedId = temp.id; }
      }
      if(temp.type === 'rect'){
        if(Math.abs(temp.x2-temp.x1)>6 && Math.abs(temp.y2-temp.y1)>6){ temp.id = uid(); objects.push(temp); selectedId = temp.id; }
      }
    }
    temp = null;
    drawing = false;
    lastPoint = null;
    render();
  });

  document.getElementById('penBtn').onclick = ()=>setTool('pen');
  document.getElementById('lineBtn').onclick = ()=>setTool('line');
  document.getElementById('rectBtn').onclick = ()=>setTool('rect');
  document.getElementById('textBtn').onclick = ()=>setTool('text');
  document.getElementById('cameraBtn').onclick = ()=>setTool('camera');
  document.getElementById('selectBtn').onclick = ()=>setTool('select');

  document.getElementById('deleteBtn').onclick = ()=>{
    if(selectedId){
      saveHistory();
      objects = objects.filter(o=>o.id!==selectedId);
      selectedId = null;
      render();
    }else setTool('delete');
  };

  document.getElementById('rotLBtn').onclick = ()=>{
    const o = objects.find(x=>x.id===selectedId);
    if(o && o.type==='camera'){ saveHistory(); o.rotation = (o.rotation - 15 + 360) % 360; render(); }
  };

  document.getElementById('rotRBtn').onclick = ()=>{
    const o = objects.find(x=>x.id===selectedId);
    if(o && o.type==='camera'){ saveHistory(); o.rotation = (o.rotation + 15) % 360; render(); }
  };

  document.getElementById('angleSel').onchange = ()=>{
    const o = objects.find(x=>x.id===selectedId);
    if(o && o.type==='camera'){ o.angle = parseInt(document.getElementById('angleSel').value,10); render(); }
  };

  document.getElementById('undoBtn').onclick = ()=>{
    if(history.length){
      const prev = JSON.parse(history.pop());
      objects = prev.objects;
      idCounter = prev.idCounter;
      selectedId = null;
      render();
    }
  };

  document.getElementById('clearBtn').onclick = ()=>{
    if(confirm('清空画板？')){ saveHistory(); objects = []; selectedId = null; temp = null; render(); }
  };

  document.getElementById('saveBtn').onclick = ()=>{
    localStorage.setItem('hj_canvas_board', JSON.stringify({objects,idCounter}));
    alert('Saved');
  };

  document.getElementById('loadBtn').onclick = ()=>{
    const data = localStorage.getItem('hj_canvas_board');
    if(!data){ alert('No saved drawing'); return; }
    const parsed = JSON.parse(data);
    objects = parsed.objects || [];
    idCounter = parsed.idCounter || 1;
    selectedId = null;
    render();
  };

  document.getElementById('pngBtn').onclick = ()=>{
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'HJ_Canvas_Board.png';
    a.click();
  };

  window.addEventListener('keydown', e=>{
    if(e.key === 'Delete' || e.key === 'Backspace'){
      if(selectedId){ saveHistory(); objects = objects.filter(o=>o.id!==selectedId); selectedId = null; render(); }
    }
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='z'){
      document.getElementById('undoBtn').click();
      e.preventDefault();
    }
  });

  setTimeout(resize, 50);
  setTimeout(resize, 300);
  updateStatus();
})();
</script>
</body>
</html>
